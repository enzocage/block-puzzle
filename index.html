<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokoban Block Puzzle</title>
    <style>
        :root {
            --bg-outer: #0f1218;
            --bg-floor: #384d70;
            --color-wall: #75a3e3;
            --color-box: #75a3e3;
            --color-player: #62b058;
            --color-target-red: #d34040;
            --color-target-blue: #243654;
            --animation-speed: 0.15s;
            
            /* Dynamische Radien für die perfekte visuelle Symmetrie */
            --dynamic-radius: 8px;
            --dynamic-border: 3px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-outer);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Kamera-Rahmen */
        #game-container {
            width: 95vw;
            height: 60vh;
            max-width: 1000px;
            max-height: 600px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background-color: #1a222d;
            box-shadow: inset 0 6px 24px rgba(0, 0, 0, 0.7);
            border: 2px solid #2d394a;
        }

        #game-container:active {
            cursor: grabbing;
        }

        /* Das Spielfeld */
        #game-board {
            position: absolute;
            background-color: var(--bg-floor);
            border-radius: var(--dynamic-radius);
            transform-origin: 0 0; /* Wichtig für präzise Skalierung beim Zoomen */
        }

        .tile, .entity {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .entity {
            transition: transform var(--animation-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Tiefen & Farben der Spielelemente */
        .target { z-index: 1; opacity: 0.8; }
        .wall { background-color: var(--color-wall); z-index: 10; }
        .box { background-color: var(--color-box); z-index: 20; }
        .player { background-color: var(--color-player); z-index: 30; }

        /* Zielmarkierungen */
        .target.red { 
            border: var(--dynamic-border) dashed var(--color-target-red); 
            border-radius: var(--dynamic-radius); 
        }
        .target.blue { 
            border: var(--dynamic-border) dashed var(--color-target-blue); 
            border-radius: var(--dynamic-radius); 
        }

        /* Animierte Kulleraugen */
        .eyes {
            position: absolute;
            width: 60%;
            height: 25%;
            display: flex;
            justify-content: space-between;
            top: 35%;
            transition: transform 0.15s ease-out;
        }
        
        .eye {
            width: 30%;
            aspect-ratio: 1;
            background-color: #0d1624;
            border-radius: 50%;
            animation: blink 4s infinite;
            transform-origin: center;
        }
        
        .box .eye {
            background-color: #1a273b;
        }

        @keyframes blink {
            0%, 46%, 48%, 100% { transform: scaleY(1); }
            47% { transform: scaleY(0.1); }
        }
        
        /* Kollisions-Animationen */
        .bump-up { animation: bumpUp 0.15s ease-out; }
        .bump-down { animation: bumpDown 0.15s ease-out; }
        .bump-left { animation: bumpLeft 0.15s ease-out; }
        .bump-right { animation: bumpRight 0.15s ease-out; }

        @keyframes bumpUp { 50% { margin-top: -10px; } }
        @keyframes bumpDown { 50% { margin-top: 10px; } }
        @keyframes bumpLeft { 50% { margin-left: -10px; } }
        @keyframes bumpRight { 50% { margin-left: 10px; } }

        /* Header & Navigation */
        #header-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 95vw;
            max-width: 1000px;
            background: rgba(20, 26, 38, 0.9);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
        }

        .level-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--color-wall);
        }

        .nav-controls {
            display: flex;
            gap: 8px;
        }

        select {
            background-color: #384d70;
            color: white;
            border: 1px solid #4a6b9c;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        button {
            background-color: #4a6b9c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #2a3a54;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #2a3a54;
        }

        /* Mobiles Steuerkreuz */
        #mobile-dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 5px;
        }
        .dpad-row {
            display: flex;
            gap: 5px;
        }
        .dpad-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #384d70;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a273b;
        }
        .dpad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1a273b;
        }
        .dpad-center {
            width: 50px;
            height: 50px;
        }

        /* Gewinn-Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 18, 24, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            text-align: center;
        }
        #overlay.visible { opacity: 1; pointer-events: auto; }
        #overlay h1 { color: var(--color-player); font-size: 36px; margin-bottom: 5px; text-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #overlay p { font-size: 18px; color: #8fa6c9; margin-bottom: 20px; }

        .hint { margin-top: 10px; color: #8fa6c9; font-size: 13px; text-align: center; }

        @media (min-width: 1024px) {
            #mobile-dpad {
                display: none; /* Auf Desktop-PCs ausblenden */
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <div id="header-panel">
        <div class="level-title" id="current-level-name">Level 1: Aufwärmen</div>
        <div class="nav-controls">
            <select id="level-select" onchange="changeLevel(this.value)">
                <!-- Wird dynamisch mit JS befüllt -->
            </select>
            <button onclick="initLevel()">Neustart</button>
            <button onclick="resetCamera()">Fokus</button>
        </div>
    </div>

    <!-- Haupt-Spielfeld -->
    <div id="game-wrapper">
        <div id="game-container">
            <div id="game-board"></div>
            <div id="overlay">
                <h1>Hervorragend!</h1>
                <p>Level erfolgreich absolviert.</p>
                <button onclick="nextLevel()">Nächstes Level</button>
            </div>
        </div>
    </div>

    <!-- Mobiles D-Pad -->
    <div id="mobile-dpad">
        <div class="dpad-row">
            <button class="dpad-btn" onclick="move(0, -1)">▲</button>
        </div>
        <div class="dpad-row">
            <button class="dpad-btn" onclick="move(-1, 0)">◀</button>
            <div class="dpad-center"></div>
            <button class="dpad-btn" onclick="move(1, 0)">▶</button>
        </div>
        <div class="dpad-row">
            <button class="dpad-btn" onclick="move(0, 1)">▼</button>
        </div>
    </div>

    <div class="hint">Tastatur (WASD / Pfeiltasten) | Mausrad zum Zoomen | Ziehen zum Verschieben</div>

<script src="game.js"></script>
</body>
</html>
